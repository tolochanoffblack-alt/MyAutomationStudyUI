name: Automation Tests CI

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser for UI tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

  schedule:
    - cron: '0 8 * * *'

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

      - name: Run API tests
        run: dotnet test --no-build --filter "TestCategory=API" --logger "trx;LogFileName=api-tests.trx"

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: '**/TestResults/*.trx'

  ui-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

      - name: Run UI tests
        run: dotnet test --no-build --filter "TestCategory!=API" --logger "trx;LogFileName=ui-tests.trx"

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: '**/TestResults/*.trx'